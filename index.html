<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Mollink — Creative Director</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* 1. THE BASICS - PURE BLACK & RED */
        body {
            background-color: #000000 !important;
            color: #ff3300; 
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            gap: 100px; /* Big gaps between sections */
            line-height: 1.1;
        }

        /* 2. TEXT SIZES - EVERYTHING LARGE */
        .name {
            font-size: clamp(3.5rem, 10vw, 6rem);
            color: #ff0000;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .director-title, .label, a {
            font-size: clamp(1.8rem, 5vw, 2.5rem); /* Matches Director size */
            color: #ff3300;
            text-transform: uppercase;
            text-decoration: none;
        }

        .label {
            display: block;
            opacity: 0.6;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* 3. SHOWREELS STACKED */
        .video-container {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            border: 2px solid #330000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 4. CLICKABLE LINKS */
        .link-item {
            display: inline-block;
            border-bottom: 4px solid #ff3300;
            padding-bottom: 5px;
            transition: 0.2s;
        }

        .link-item:hover {
            color: #ffffff;
            border-color: #ffffff;
        }

        .footer {
            font-size: 14px;
            opacity: 0.3;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div>
        <div class="name">JASON MOLLINK</div>
        <div class="director-title">DIRECTOR</div>
    </div>

    <section>
        <span class="label">// CONTENT SHOWREEL</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/c93jEkLdAPc" allowfullscreen></iframe>
        </div>
    </section>

    <section>
        <span class="label">// FILM SHOWREEL</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/OCEEMHFYaZY" allowfullscreen></iframe>
        </div>
    </section>

    <section>
        <span class="label">// PHOTOGRAPHY</span>
        <a href="photography-portfolio.pdf" target="_blank" class="link-item">View Photography Portfolio PDF →</a>
    </section>

    <section>
        <span class="label">// WRITING</span>
        <a href="writing-portfolio.pdf" target="_blank" class="link-item">View Writing Portfolio PDF →</a>
    </section>

    <section>
        <span class="label">// CONTACT</span>
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <a href="mailto:jason.mollink@gmail.com" class="link-item">Email Me</a>
            <a href="https://www.linkedin.com/in/jason-mollink-a73b09319/" target="_blank" class="link-item">LinkedIn</a>
        </div>
    </section>

    <div class="footer">
        © 2026 JASON MOLLINK // NO_SIGNAL
    </div>

</body>
</html>
