<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jason Mollink — Director</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        /* 1. THE BASICS - PURE BLACK & RED */
        body {
            background-color: #000000 !important;
            color: #ff3300; /* High-contrast Red */
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 80px; /* Large space between everything */
            line-height: 1.2;
        }

        /* 2. TEXT SIZES */
        .name {
            font-size: 60px;
            color: #ff0000;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .director-title {
            font-size: 40px;
            color: #ff3300;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .label {
            font-size: 18px;
            color: #ff3300;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: block;
        }

        /* 3. SHOWREELS STACKED */
        .video-container {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            border: 2px solid #330000;
            background: #080808;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 4. PDF EMBEDS */
        .pdf-viewer {
            width: 100%;
            max-width: 900px;
            height: 600px;
            border: 2px solid #330000;
            background: #111;
        }

        /* 5. LINKS */
        a {
            color: #ff3300;
            text-decoration: underline;
            font-size: 24px;
        }

        a:hover {
            color: #ffffff;
        }

        .footer {
            font-size: 14px;
            opacity: 0.5;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div>
        <div class="name">JASON MOLLINK</div>
        <div class="director-title">DIRECTOR</div>
    </div>

    <section>
        <span class="label">// CONTENT SHOWREEL</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/c93jEkLdAPc" allowfullscreen></iframe>
        </div>
    </section>

    <section>
        <span class="label">// FILM SHOWREEL</span>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/OCEEMHFYaZY" allowfullscreen></iframe>
        </div>
    </section>

    <section>
        <span class="label">// PHOTOGRAPHY PORTFOLIO</span>
        <iframe src="photography-portfolio.pdf" class="pdf-viewer"></iframe>
        <br><br>
        <a href="photography-portfolio.pdf" target="_blank">Open PDF Fullscreen</a>
    </section>

    <section>
        <span class="label">// WRITING PORTFOLIO</span>
        <iframe src="writing-portfolio.pdf" class="pdf-viewer"></iframe>
        <br><br>
        <a href="writing-portfolio.pdf" target="_blank">Open PDF Fullscreen</a>
    </section>

    <section>
        <span class="label">// CONTACT</span>
        <a href="mailto:jason.mollink@gmail.com">jason.mollink@gmail.com</a><br><br>
        <a href="https://www.linkedin.com/in/jason-mollink-a73b09319/" target="_blank">LinkedIn</a>
    </section>

    <div class="footer">
        © 2026 JASON MOLLINK
    </div>

</body>
</html>
